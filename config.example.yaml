# OperatorConfig shape. Zero-state operators: pass a private onboarding source
# to `py -m edge_deploy onboard --config …` (do not commit that file). Onboard
# installs %APPDATA%/edge-deploy/config.yaml from it.
#
# Private onboarding source requirements:
#   Required: operator_email, nodes, bitbucket_remotes.core, and one
#     bitbucket_remotes.<canonical-tool> entry per selected tool
#     (autobench and/or robocop).
#   Optional: checkout_root only (defaults to %USERPROFILE%/edge-deploy).
#   CLI `--tool dispatch` maps to canonical tool id robocop — supply
#     bitbucket_remotes.robocop; there is no bitbucket_remotes.dispatch key.
# Staging-only keys (not stored in onboarding-state.json; fingerprint only):
#   checkout_root: C:/edge-deploy
#   bitbucket_remotes:
#     core: https://bitbucket.example/scm/project/edge-deploy-core.git
#     autobench: https://bitbucket.example/scm/project/autobench.git
#     robocop: https://bitbucket.example/scm/project/robocop.git
# Credentials (BB_TOKEN, RSA, Kerberos) must never appear in YAML.
# BB_TOKEN remains an environment variable.
# Replace example hosts/remotes with your private values outside Git.
#
# Legacy/manual (not using onboard): copy this file to
# %APPDATA%/edge-deploy/config.yaml and keep it private.

operator_email: operator@example.com
audit_repo: C:/path/to/edge-deploy-core

nodes:
  node03:
    host: operator@edge-node-03.example
    ssh_options: "-p 2222 -o ServerAliveInterval=30"
    session: edge-node03
    transport: ssh  # "pane" is an explicit per-node recovery override (ADR-0011).
  node04:
    host: operator@edge-node-04.example
    ssh_options: "-p 2222 -o ServerAliveInterval=30"
    session: edge-node04
    transport: ssh  # "pane" is an explicit per-node recovery override (ADR-0011).
